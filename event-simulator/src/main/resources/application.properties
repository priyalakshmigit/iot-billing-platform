spring.application.name=event-simulator

# Kafka configuration (can be overridden via env vars)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093,localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=${KAFKA_PRODUCER_BATCH_SIZE:65536}
spring.kafka.producer.linger-ms=${KAFKA_PRODUCER_LINGER_MS:20}
iot.topic.events.name=${IOT_EVENTS_TOPIC:iot-events}
iot.topic.events.partitions=${IOT_EVENTS_PARTITIONS:3}
iot.topic.events.replicas=${IOT_EVENTS_REPLICAS:2}

# Simulator configuration
simulator.devices.count=${SIMULATOR_DEVICES_COUNT:10000}

server.port=8083