global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: event-consumer
    metrics_path: /metrics
    static_configs:
      - targets:
          - event-consumer:8083

  - job_name: api-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-server:8082
