spring.application.name=api-server

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:billing}
spring.datasource.username=${DB_USER:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093,localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

iot.topic.events.name=${IOT_EVENTS_TOPIC:iot-events}
sweeper.scan-interval-ms=${SWEEPER_SCAN_INTERVAL_MS:60000}
sweeper.stale-threshold-seconds=${SWEEPER_STALE_THRESHOLD_SECONDS:90}
sweeper.finalizing-recovery-seconds=${SWEEPER_FINALIZING_RECOVERY_SECONDS:120}
sweeper.publish-timeout-ms=${SWEEPER_PUBLISH_TIMEOUT_MS:5000}

grpc.server.port=${GRPC_PORT:9091}
api.auth.token=${API_AUTH_TOKEN:skylo-dev-token}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
server.port=${API_SERVER_HTTP_PORT:8082}
